spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: dracolich-ai-api
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
  webflux:
    base-path: dracolich/ai/api/v0/
  mongodb:
    database: ${MONGODB_DATABASE}
    uri: ${MONGODB_URI}
    auto-index-creation: false

server:
  port: ${PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# Anthropic / Spring AI
spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    chat:
      options:
        model: claude-sonnet-4-20250514
        max-tokens: 4096
        temperature: 0.7

# MTG Library API base URL (Phase 1 service) — Java code uses dracolich.* prefix
dracolich:
  mtg-library:
    api:
      base-url: ${DRACOLICH_MTG_LIBRARY_API_BASE_URL:http://localhost:8080/dracolich/mtg-library/api/v0}

management:
  server:
    port: 7980
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true